services:
  web:
    build:
      context: .
      dockerfile: ./docker/pnpm-build/Dockerfile
      target: web
    environment:
      # Database Configuration
      - PGHOST=db
      - PGUSER=${PGUSER:-yaltt}
      - PGPASSWORD=${PGPASSWORD:-at£{N3w*;~3Rv?Tjlc"6b5^VqjM@0M}
      - PGDATABASE=${PGDATABASE:-yaltt}
      - PGPORT=${PGPORT:-5432}

      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}

      # Application Configuration
      - YALTT_HOST=${YALTT_HOST:-yaltt.paulgray.net}
      - SSL=${SSL:-true}
      - NODE_ENV=production

      # Static Assets
      - STATIC_ROOT=/app/packages/frontend/dist
      - DOCS_ROOT=/app/packages/docs/build
      - MIGRATIONS_DIR=/app/migrations

      # Admin Credentials
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-rCdAb$3c48!X}

      # Google OAuth Credentials
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-320261167857-mnqoq0m31fpiues4o2o7lns1afnn6sil.apps.googleusercontent.com}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-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}

      # Session Secret (should be a random string in production)
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}

      # Optional: JWT Secret
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}

    command:
      - node
      - --experimental-specifier-resolution=node
      - /app/packages/backend/dist/index.js

    working_dir: /app

    ports:
      - "${PORT:-3000}:3000"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${PGUSER:-yaltt}
      - POSTGRES_PASSWORD=${PGPASSWORD:-at£{N3w*;~3Rv?Tjlc"6b5^VqjM@0M}
      - POSTGRES_DB=${PGDATABASE:-yaltt}

    volumes:
      - postgres-data:/var/lib/postgresql/data

    expose:
      - "5432"

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-yaltt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine

    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}

    volumes:
      - redis-data:/data

    expose:
      - "6379"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
